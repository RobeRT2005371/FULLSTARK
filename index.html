<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Fast Translator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Fast Translator</h1>
    
    <div class="controls">
      <select id="sourceLang">
        <option value="en">English</option>
        <option value="fr">French</option>
      </select>
      
      <button id="switchBtn">⇄</button>
      
      <select id="targetLang">
        <option value="fr">French</option>
        <option value="en">English</option>
      </select>
    </div>
    
    <textarea id="inputText" maxlength="500" placeholder="Type text here..."></textarea>
    <textarea id="outputText" readonly placeholder="Translation will appear here..."></textarea>
    
    <div class="actions">
      <button id="listenInput">🔊 Listen Input</button>
      <button id="copyInput">📋 Copy Input</button>
      <button id="listenOutput">🔊 Listen Output</button>
      <button id="copyOutput">📋 Copy Output</button>
    </div>
  </div>
  
  <script src="script.js"></script>
</body>
</html>
